<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Luyện Thi A0</title>
  <style>
    /* 1. Cấu hình chung cho toàn trang */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 2. Thanh Menu màu xanh */
    .navbar {
      background-color: #0000FF; /* Màu xanh chuẩn như hình */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      height: 60px;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .navbar li {
      margin: 0 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      cursor: pointer;
      position: relative;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.5px;
      padding: 0 5px;
    }

    /* 3. Thanh gạch chân màu trắng (Active State) */
    .navbar li.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 6px; /* Độ dày thanh gạch chân */
      background-color: white;
    }

    .navbar li:hover a {
      opacity: 0.8;
    }

    /* 4. Khung chứa nội dung (Iframe) */
    .content-container {
      flex: 1; /* Tự động chiếm hết phần còn lại của màn hình */
      width: 100%;
      border: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- Thanh Menu điều hướng -->
  <div class="navbar">
    <ul>
      <li class="active"><a href="#">Trang chủ</a></li>
      <li><a href="#">Học - Trắc nghiệm</a></li>
      <li><a href="#">Vấn đáp</a></li>
      <li><a href="#">Test - Trắc nghiệm</a></li>
    </ul>
  </div>

  <!-- Vùng hiển thị nội dung Google Script -->
  <div class="content-container">
    <iframe src="https://script.google.com/macros/s/AKfycbx2FWl8RrNtLZn1jhmSZBBwX8h1NuggACniYwZEibBZBxZGnk3XhuadpbPeG5Gn44hQ/exec"></iframe>
  </div>

  <script>
    // Script để chuyển đổi trạng thái gạch chân khi nhấn menu
    const menuItems = document.querySelectorAll('.navbar li');
    menuItems.forEach(item => {
      item.addEventListener('click', function() {
        menuItems.forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        
        // Tại đây bạn có thể thêm code để đổi link Iframe nếu muốn
        // ví dụ: document.querySelector('iframe').src = "link_khac";
      });
    });
  </script>

</body>
</html>
