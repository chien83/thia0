<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luyện Trắc Nghiệm A0</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    :root { 
      --primary-blue: #0d6efd; 
      --danger-red: #dc3545; 
      --success-green: #198754;
      --base-font-size: 18px; 
    }

    body { 
      background-color: #f0faff; 
      padding: 10px; 
      font-family: -apple-system, system-ui, sans-serif; 
      font-size: var(--base-font-size);
      overflow-x: hidden;
    }

    .main-wrapper { 
      display: flex; 
      max-width: 1400px; 
      margin: auto; 
      gap: 15px; 
      align-items: flex-start;
    }

    .quiz-container { 
      flex: 1; 
      background: white; 
      padding: 25px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .nav-panel { 
      width: 140px; 
      background: white; 
      padding: 15px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      position: -webkit-sticky; 
      position: sticky; 
      top: 10px; 
      z-index: 1000;
      will-change: transform;
    }

    #timer-container {
      border: 2px solid blue; 
      border-radius: 8px; padding: 8px 2px; 
      text-align: center; margin-bottom: 12px; background: #fff;
    }
    #timer { font-size: 1.3rem; font-weight: 800; color: var(--danger-red); font-family: monospace; }

    .nav-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; 
      max-height: 400px; overflow-y: auto; padding: 2px;
    }
    .nav-box {
      width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      border: 1px solid #ddd; border-radius: 6px; font-size: 0.85rem;
      cursor: pointer; text-decoration: none; color: #333; background: #fff;
    }
    .nav-box.answered { background-color: var(--primary-blue) !important; color: white !important; }
    .nav-box.current { border: 2.5px solid #ffc107; font-weight: bold; }

    #submit-btn-sidebar, #submit-btn-bottom {
      background-color: var(--danger-red); color: white; border: none; 
      border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    #submit-btn-sidebar { width: 100%; padding: 10px 2px; font-size: 0.95rem; margin-top: 15px; }
    #submit-btn-bottom { display: none; width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 20px; }

    h2 { font-size: 1.5rem; font-weight: bold; color: var(--primary-blue); text-align: center; margin-bottom: 25px; }
    .question-block { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
    .question-title { font-size: 1.15rem; font-weight: 600; line-height: 1.6; margin-bottom: 15px; color: #1a1a1a; }
    
    .form-check { padding: 0; position: relative; margin-bottom: 8px; border-radius: 8px; }
    .form-check-label { display: block; width: 100%; padding: 12px 15px 12px 55px; cursor: pointer; font-size: 1.05rem; border-radius: 8px; }
    .form-check-input { position: absolute; left: 20px; top: 16px; transform: scale(1.4); }

    .option-correct { background-color: #d1e7dd !important; border: 1px solid #a3cfbb; color: #0a58ca; font-weight: bold; }
    .option-wrong { background-color: #f8d7da !important; border: 1px solid #f5c2c7; color: #842029; text-decoration: line-through; }

    .pagination-btns { display: flex; gap: 12px; margin-top: 25px; }
    .pagination-btns .btn { flex: 1; font-size: 1.1rem; padding: 12px; font-weight: bold; }

    @media (max-width: 768px) {
      :root { --base-font-size: 16px; }
      .nav-panel { width: 110px; padding: 10px; }
      .nav-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="quiz-container">
      <h2 id="quiz-header">LUYỆN TRẮC NGHIỆM A0</h2>
      <div id="result" class="alert text-center py-4" style="display:none;"></div>
      
      <div id="quiz-content">Đang tải câu hỏi...</div>

      <div id="pagination-controls" class="pagination-btns" style="display:none;">
        <button id="prev-btn" class="btn btn-outline-primary" onclick="changePage(-1)">QUAY LẠI</button>
        <button id="next-btn" class="btn btn-primary" onclick="changePage(1)">TIẾP THEO</button>
      </div>

      <button id="submit-btn-bottom" onclick="checkAnswers()">NỘP BÀI</button>

      <div id="after-submit-controls" class="mt-4" style="display:none;">
        <button class="btn btn-info w-100 text-white fw-bold py-3 mb-2" onclick="reviewAllQuestions()">XEM LẠI TOÀN BỘ CÂU HỎI & TRẢ LỜI</button>
        <button class="btn btn-secondary w-100 py-3" onclick="restartQuiz()">LÀM ĐỀ KHÁC</button>
      </div>
    </div>

    <div id="side-nav" class="nav-panel" style="display:none;">
      <div id="timer-container"><div id="timer">60:00</div></div>
      <div class="nav-grid" id="nav-grid"></div>
      <button id="submit-btn-sidebar" onclick="checkAnswers()">NỘP BÀI</button>
    </div>
  </div>

<script>
  /* --- CẤU HÌNH KẾT NỐI --- */
  // Link của bạn đã được dán sẵn ở đây
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyss3IaXbrbqw1yUD-_VRF77YgidAQJ31UPYmDcyULZQg-9ro8vZh3i3X-vsesn1T9A/exec?type=data";

  let allQuestions = [];
  let userAnswers = {};
  let currentPage = 0;
  const questionsPerPage = 10;
  let timeLeft, timerId = null;

  window.onload = loadNewQuiz;

  function loadNewQuiz() {
    document.getElementById('quiz-content').innerHTML = "<div class='text-center p-5'>Đang kết nối dữ liệu từ máy chủ...</div>";
    document.getElementById('side-nav').style.display = "none";
    document.getElementById('pagination-controls').style.display = "none";
    document.getElementById('after-submit-controls').style.display = "none";
    document.getElementById('result').style.display = "none";
    document.getElementById('submit-btn-bottom').style.display = "none";
    if(timerId) clearInterval(timerId);

    // Sử dụng Fetch để lấy dữ liệu từ Google Script
    fetch(SCRIPT_URL)
      .then(response => {
        if (!response.ok) throw new Error("Mạng lỗi hoặc link Script không phản hồi");
        return response.json();
      })
      .then(data => {
        if (data && data.length > 0) {
          setupQuiz(data);
        } else {
          throw new Error("Không nhận được dữ liệu câu hỏi từ Sheet");
        }
      })
      .catch(error => {
        document.getElementById('quiz-content').innerHTML = 
          `<div class='alert alert-danger'>Lỗi kết nối: ${error.message}.<br><br><b>Cách sửa:</b> Hãy đảm bảo bạn đã "Deploy" (Triển khai) Web App ở chế độ "Anyone" (Bất kỳ ai).</div>`;
      });
  }

  function setupQuiz(data) {
    allQuestions = data;
    userAnswers = {};
    currentPage = 0;
    renderNav();
    renderPage();
    startTimer(60);
    document.getElementById('side-nav').style.display = "block";
    document.getElementById('pagination-controls').style.display = "flex";
  }

  function renderNav() {
    let navHtml = "";
    allQuestions.forEach((_, i) => {
      navHtml += `<div id="nav-item-${i}" class="nav-box" onclick="goToQuestion(${i})">${i + 1}</div>`;
    });
    document.getElementById('nav-grid').innerHTML = navHtml;
  }

  function renderPage() {
    let start = currentPage * questionsPerPage;
    let end = Math.min(start + questionsPerPage, allQuestions.length);
    let html = `<div class="text-center mb-3 text-muted small">Câu ${start + 1} - ${end} / ${allQuestions.length}</div>`;

    for (let i = start; i < end; i++) {
      let q = allQuestions[i];
      let options = [q[1], q[2], q[3], q[4]].filter(o => o && o !== "");
      html += `<div class="question-block">
                <div class="question-title">${i + 1}. ${q[0]}</div>`;
      options.forEach((opt, optIdx) => {
        let isChecked = userAnswers[i] === opt ? "checked" : "";
        html += `<div class="form-check">
                  <input class="form-check-input" type="radio" name="q${i}" id="q${i}_${optIdx}" value="${opt}" ${isChecked} onchange="saveAnswer(${i}, '${opt}')">
                  <label class="form-check-label" for="q${i}_${optIdx}">${opt}</label>
                </div>`;
      });
      html += `</div>`;
    }
    document.getElementById('quiz-content').innerHTML = html;
    
    let isLastPage = (end === allQuestions.length);
    document.getElementById('prev-btn').disabled = (currentPage === 0);
    document.getElementById('next-btn').style.display = isLastPage ? "none" : "block";
    document.getElementById('submit-btn-bottom').style.display = isLastPage ? "block" : "none";

    document.querySelectorAll('.nav-grid .nav-box').forEach(el => el.classList.remove('current'));
    for(let j = start; j < end; j++) {
        const item = document.getElementById(`nav-item-${j}`);
        if(item) item.classList.add('current');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function saveAnswer(index, value) {
    userAnswers[index] = value;
    document.getElementById(`nav-item-${index}`).classList.add('answered');
  }

  function changePage(step) { currentPage += step; renderPage(); }
  function goToQuestion(index) { currentPage = Math.floor(index / questionsPerPage); renderPage(); }

  function startTimer(minutes) {
    timeLeft = minutes * 60;
    if(timerId) clearInterval(timerId);
    timerId = setInterval(() => {
      timeLeft--;
      let min = Math.floor(timeLeft / 60);
      let sec = timeLeft % 60;
      document.getElementById('timer').innerHTML = `${min}:${sec < 10 ? '0'+sec : sec}`;
      if (timeLeft <= 0) { clearInterval(timerId); checkAnswers(); }
    }, 1000);
  }

  function checkAnswers() {
    if(timerId) clearInterval(timerId);
    
    document.getElementById('side-nav').style.display = "none";
    document.getElementById('submit-btn-bottom').style.display = "none";
    document.getElementById('pagination-controls').style.display = "none";
    document.getElementById('after-submit-controls').style.display = "block";

    let score = 0;
    allQuestions.forEach((q, i) => { if (userAnswers[i] === q[5]) score++; });

    let percent = Math.round((score / allQuestions.length) * 100);
    const resDiv = document.getElementById('result');
    resDiv.style.display = "block";
    resDiv.className = `alert ${percent >= 70 ? 'alert-success' : 'alert-danger'} text-center py-4`;
    resDiv.innerHTML = `<h2 class="display-4 fw-bold">${percent}%</h2><div class="h4 fw-bold">${percent >= 70 ? 'ĐẠT' : 'KHÔNG ĐẠT'}</div><div>Đúng ${score}/${allQuestions.length} câu</div>`;

    showReviewList(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showReviewList(showAll) {
    let html = `<h4 class="fw-bold mb-4 text-primary">${showAll ? 'XEM LẠI TOÀN BỘ CÂU HỎI' : 'DANH SÁCH CÂU SAI & ĐÁP ÁN'}</h4>`;
    let hasWrong = false;

    allQuestions.forEach((q, i) => {
      let correctAns = q[5];
      let userAns = userAnswers[i];
      let isCorrect = userAns === correctAns;
      if (!showAll && isCorrect) return; 
      hasWrong = true;
      let options = [q[1], q[2], q[3], q[4]].filter(o => o && o !== "");
      html += `<div class="question-block">
                <div class="question-title">${i + 1}. ${q[0]} ${isCorrect ? '<span class="text-success">✔</span>' : '<span class="text-danger">✘</span>'}</div>`;
      options.forEach(opt => {
        let styleClass = (opt === correctAns) ? "option-correct" : (opt === userAns && !isCorrect ? "option-wrong" : "");
        html += `<div class="form-check"><label class="form-check-label ${styleClass}" style="padding-left:15px; margin-left:0;">${opt}</label></div>`;
      });
      html += `</div>`;
    });

    if (!showAll && !hasWrong) html = "<div class='text-center p-5 text-success'>🎉 Tuyệt vời! Bạn không sai câu nào!</div>";
    document.getElementById('quiz-content').innerHTML = html;
  }

  function reviewAllQuestions() {
    showReviewList(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restartQuiz() { location.reload(); }
</script>
</body>
</html>
